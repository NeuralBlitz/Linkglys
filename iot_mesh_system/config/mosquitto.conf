# Mosquitto MQTT Broker Configuration
# NeuralBlitz IoT Device Mesh Integration
# =======================================

# =============================================================================
# General Settings
# =============================================================================

# Broker identifier
sys_interval 10

# Persistence settings
persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db
autosave_interval 300
autosave_on_changes false

# Logging
log_dest stderr
log_dest topic
log_type error
log_type warning
log_type information
log_type subscribe
log_type unsubscribe
connection_messages true

# =============================================================================
# Network Settings
# =============================================================================

# Default listener
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener (for browser-based clients)
listener 9001 0.0.0.0
protocol websockets

# Maximum connections
max_connections 1000

# =============================================================================
# Security Settings
# =============================================================================

# Authentication - Enable password file
# password_file /etc/mosquitto/passwd
# allow_anonymous false

# For development/demo purposes, allow anonymous connections
allow_anonymous true

# Access Control Lists
# acl_file /etc/mosquitto/acl

# TLS/SSL Configuration (Production)
# listener 8883 0.0.0.0
# cafile /etc/mosquitto/ca_certificates/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# require_certificate false
# use_identity_as_username false

# =============================================================================
# Performance Settings
# =============================================================================

# Message size limits
max_inflight_messages 20
max_queued_messages 1000
max_queued_bytes 0

# Keepalive
max_keepalive 300
retry_interval 20

# =============================================================================
# IoT Device Mesh Specific Topics
# =============================================================================

# Topic structure for IoT devices:
# iot/devices/{device_id}/command    - Commands TO device
# iot/devices/{device_id}/status     - Status updates FROM device
# iot/devices/{device_id}/telemetry  - Sensor data FROM device
# iot/devices/{device_id}/sensors/+  - Individual sensor readings
# iot/discovery/+                    - Device discovery broadcasts
# iot/registry/devices               - Device registry (retained)
# iot/automation/rules               - Automation rules (retained)
# iot/scenes/+                       - Scene activations
# iot/notifications/+                - System notifications

# Bridge configuration for multi-broker mesh
# connection bridge-01
# address secondary-broker.local:1883
# topic # both 0
# bridge_protocol_version mqttv311
# notifications true
# try_private true

# =============================================================================
# Advanced Settings
# =============================================================================

# Message expiry
message_expiry_interval 86400

# Queue QoS 0 messages
queue_qos0_messages false

# Upgrade outgoing QoS
upgrade_outgoing_qos false

# =============================================================================
# Plugin Settings
# =============================================================================

# Enable persistence plugin
# plugin /usr/lib/mosquitto/mosquitto_persist_sqlite.so
# plugin_opt_sqlite_path /var/lib/mosquitto/mosquitto.db

# =============================================================================
# Memory Limits
# =============================================================================

# Memory limit (bytes) - 0 = unlimited
# memory_limit 0

# =============================================================================
# Timeout Settings
# =============================================================================

persistent_client_expiration 1m

# =============================================================================
# Include Directory
# =============================================================================

# Include additional configuration files
# include_dir /etc/mosquitto/conf.d
