# InfluxDB Configuration for Telemetry Storage
# Configuration file for InfluxDB v2.x

[http]
  enabled = true
  bind-address = ":8086"
  auth-enabled = true
  log-enabled = true
  write-tracing = false
  pprof-enabled = false
  pprof-auth-enabled = false
  debug-pprof-enabled = false
  ping-auth-enabled = false
  flux-enabled = true
  flux-log-enabled = false
  max-row-limit = 10000
  max-connection-limit = 0
  shared-secret = ""
  realm = "InfluxDB"
  unix-socket-enabled = false
  unix-socket-permissions = "0777"
  bind-socket = "/var/run/influxdb.sock"
  max-body-size = 25000000
  access-log-path = ""
  max-concurrent-write-limit = 0
  max-enqueued-write-limit = 0
  enqueued-write-timeout = 30000000000

[data]
  index-version = "inmem"
  cache-max-memory-size = 1048576000
  cache-snapshot-memory-size = 26214400
  cache-snapshot-write-cold-duration = "10m"
  compact-full-write-cold-duration = "4h"
  compact-throughput = 50331648
  compact-throughput-burst = 50331648
  max-series-per-database = 1000000
  max-values-per-tag = 100000
  max-concurrent-compactions = 0
  max-index-log-file-size = 1048576
  series-id-set-cache-size = 100
  series-file-max-concurrent-snapshot-compactions = 0
  trace-logging-enabled = false
  tsdb-use-madv-willneed = false

[meta]
  dir = "/var/lib/influxdb2/meta"
  retention-autocreate = true
  logging-enabled = true

[coordinator]
  write-timeout = "10s"
  max-concurrent-queries = 0
  query-timeout = "0s"
  log-queries-after = "0s"
  max-select-point = 0
  max-select-series = 0
  max-select-buckets = 0

[retention]
  enabled = true
  check-interval = "30m"

[logging]
  format = "auto"
  level = "info"
  suppress-logo = false

[subscriber]
  enabled = true
  http-timeout = "30s"
  insecure-skip-verify = false
  ca-certs = ""
  write-concurrency = 40
  write-buffer-size = 1000

[continuous_queries]
  enabled = true
  log-enabled = true
  query-stats-enabled = false
  run-interval = "1m"

[tls]
  min-version = ""
  max-version = ""

[[influxdb]]
  urls = ["http://localhost:8086"]
  token = "telemetry-token-xyz"
  org = "neuralblitz"
  active = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "telemetry-token-xyz"
  organization = "neuralblitz"
  bucket = "system_metrics"
  insecure_skip_verify = false