version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/neuralblitz-dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "dashboard-deps"
    labels:
      - "dependencies"
      - "dashboard"

  - package-ecosystem: "pip"
    directory: "/lrs_agents"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "py-deps"
    labels:
      - "dependencies"
      - "python"
